version: '3.8'
services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: cryptodb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  bot:
    build: .
    command: python manage.py shell -c "from tracker.flows import start; start()"
    volumes:
      - .:/app
    depends_on:
      - db

volumes:
  postgres_data:
